spring.datasource.url=jdbc:h2:mem:ragserver_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.sql.init.mode=never
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

spring.ai.vectorstore.neo4j.initialize-schema=false
spring.ai.openai.api-key=test-key
spring.ai.openai.chat.options.model=qwen-max
app.rag.index.enabled=false
app.rag.rerank.enabled=false
app.rag.rerank.endpoint=https://dashscope.aliyuncs.com/api/v1/services/rerank/text-rerank/text-rerank
