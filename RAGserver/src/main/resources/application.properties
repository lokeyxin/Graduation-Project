spring.application.name=RAGserver

spring.neo4j.uri=bolt://localhost:7687
spring.neo4j.authentication.username=neo4j
spring.neo4j.authentication.password=djx123456

spring.ai.vectorstore.neo4j.initialize-schema=true
spring.ai.vectorstore.neo4j.index-name=knowledge-index

spring.datasource.url=jdbc:mysql://localhost:3306/ragserver?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

spring.sql.init.mode=never
spring.sql.init.schema-locations=classpath:db/schema.sql
spring.sql.init.data-locations=classpath:db/data.sql

spring.ai.openai.base-url=https://dashscope.aliyuncs.com/compatible-mode
spring.ai.openai.api-key=sk-d7af0c0a08c84814a5e80bccde0977ee
spring.ai.openai.chat.options.model=qwen-max
spring.ai.openai.embedding.options.model=text-embedding-v3


app.rag.rerank.enabled=true
app.rag.rerank.model=qwen3-rerank
app.rag.rerank.endpoint=https://dashscope.aliyuncs.com/api/v1/services/rerank/text-rerank/text-rerank
app.rag.rerank.recall-top-k=20
app.rag.rerank.final-top-k=5
app.rag.rerank.alpha=0.7
app.rag.rerank.beta=0.3
app.rag.rerank.timeout-ms=8000

app.jwt.secret=ragserverJwtSecretKeyForHmacSha256AtLeast32Chars
app.jwt.expire-minutes=720

app.upload.knowledge-dir=uploads/knowledge
app.upload.allowed-extensions=.docx,.pdf,.md,.json,.txt,.jsonl
app.rag.index.max-batch-size=10
app.graph.enabled=true
app.graph.extraction.enabled=true
app.graph.extraction.retry-on-concept-bias=true
app.graph.extraction.concept-bias-threshold=0.8
app.graph.retrieval.fulltext-index=entityNameIndex
app.graph.retrieval.keyword-window=6
app.graph.retrieval.max-keywords=20
app.graph.retrieval.fulltext-top-k=30
app.graph.retrieval.expand-depth=2
app.graph.retrieval.max-expand-nodes=200
app.graph.retrieval.vector-threshold=0.65
app.rag.hybrid.rrf-k=60
app.rag.hybrid.graph-vector-top-k=40
app.rag.hybrid.rrf-weight=0.2

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=200
spring.task.execution.thread-name-prefix=doc-ingest-

#debug=true